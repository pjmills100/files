<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure File Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #1a1c20;
      --surface:     #22252b;
      --surface2:    #292d35;
      --border:      #3a4150;
      --accent:      #5ab4e8;
      --accent-dim:  #5ab4e822;
      --text:        #d4e8f5;
      --muted:       #6a8ea8;
      --success:     #4ecb8d;
      --error:       #f05570;
      --font-display:'Syne', sans-serif;
      --font-mono:   'Space Mono', monospace;
      --radius:      12px;
      --ease:        cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);color:var(--text);font-family:var(--font-display);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:48px 48px;opacity:.35;z-index:0;animation:gridShift 20s linear infinite;
    }
    @keyframes gridShift{from{background-position:0 0}to{background-position:48px 48px}}
    body::after{
      content:'';position:fixed;width:600px;height:600px;border-radius:50%;
      background:radial-gradient(circle,#5ab4e812 0%,transparent 70%);
      top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;
      animation:blobPulse 6s ease-in-out infinite;
    }
    @keyframes blobPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}

    /* CARD */
    .card{
      position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);width:100%;max-width:500px;padding:40px 36px;
      box-shadow:0 0 60px #5ab4e810,0 24px 80px #00000080;
      animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .card::before{
      content:'';position:absolute;top:0;left:20px;right:20px;height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:0 0 2px 2px;
    }

    /* HEADER */
    .vault-icon{
      display:flex;align-items:center;justify-content:center;width:56px;height:56px;
      border:1px solid var(--border);border-radius:14px;background:var(--accent-dim);
      margin-bottom:20px;font-size:24px;
    }
    h1{font-size:1.75rem;font-weight:800;letter-spacing:-.03em;color:#fff;margin-bottom:6px}
    .subtitle{font-family:var(--font-mono);font-size:.72rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px}

    /* STEP DOTS */
    .steps{display:flex;gap:6px;margin-bottom:32px}
    .step-dot{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s var(--ease)}
    .step-dot.active{background:var(--accent)}
    .step-dot.done{background:var(--accent);opacity:.4}

    /* INPUTS */
    .field-label{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:block}
    .input{
      width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:var(--font-mono);font-size:.95rem;padding:12px 16px;
      outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
    }
    .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
    .input.error{border-color:var(--error);box-shadow:0 0 0 3px #ff446620}
    .input.ok{border-color:var(--success);box-shadow:0 0 0 3px var(--accent-dim)}

    /* MESSAGES */
    .msg{font-family:var(--font-mono);font-size:.78rem;margin-top:10px;padding:8px 12px;border-radius:6px;display:none;line-height:1.4}
    .msg.error{display:block;color:var(--error);background:#ff446618;border:1px solid #ff446630}
    .msg.success{display:block;color:var(--success);background:#00ffb318;border:1px solid #00ffb330}

    /* BUTTONS */
    .btn{
      display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
      margin-top:20px;padding:13px 24px;border-radius:8px;border:none;
      font-family:var(--font-display);font-weight:600;font-size:.95rem;cursor:pointer;
      transition:transform .15s,box-shadow .15s;
    }
    .btn:active{transform:scale(.98)}
    .btn-primary{background:var(--accent);color:#000;box-shadow:0 4px 24px #5ab4e830}
    .btn-primary:hover{box-shadow:0 4px 32px #5ab4e850;transform:translateY(-1px)}
    .btn-download{background:linear-gradient(135deg,var(--accent),#3fd8f5);color:#000;font-size:1rem;padding:16px 24px;animation:glowPulse 2s ease-in-out infinite}
    @keyframes glowPulse{0%,100%{box-shadow:0 4px 32px #5ab4e840}50%{box-shadow:0 4px 48px #5ab4e870}}
    .btn-download:hover{transform:translateY(-2px)}

    /* PUZZLE BOX */
    .puzzle-progress{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .puzzle-counter{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
    .puzzle-pips{display:flex;gap:6px}
    .pip{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s var(--ease),transform .3s var(--ease)}
    .pip.active{background:var(--accent);transform:scale(1.2)}
    .pip.done{background:var(--accent);opacity:.4;transform:scale(1)}
    .puzzle-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px}
    .puzzle-type{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
    .puzzle-question{font-size:1rem;font-weight:600;color:#fff;line-height:1.5;user-select:none;-webkit-user-select:none}

    /* SECTIONS */
    .section{display:none}
    .section.active{display:block;animation:fadeUp .4s var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    /* SUCCESS */
    .success-icon{font-size:3rem;margin-bottom:16px;display:block;animation:bounceIn .5s cubic-bezier(.22,1,.36,1) both}
    @keyframes bounceIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    .success-title{font-size:1.4rem;font-weight:800;color:var(--accent);margin-bottom:8px}
    .success-sub{font-family:var(--font-mono);font-size:.78rem;color:var(--muted);margin-bottom:28px;line-height:1.6}
    .security-note{margin-top:24px;padding:12px 16px;border-radius:8px;border:1px dashed var(--border);font-family:var(--font-mono);font-size:.68rem;color:var(--muted);line-height:1.6}
    .security-note strong{color:#ff3cac}

    /* ═══════════════════════════════════════════════════════
       INTERACTIVE WIDGETS
    ═══════════════════════════════════════════════════════ */

    /* Multiple choice */
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
    .choice-btn{
      background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:var(--font-display);font-size:.88rem;font-weight:600;
      padding:12px 8px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;
      text-align:center;user-select:none;
    }
    .choice-btn:hover{border-color:var(--accent);background:var(--accent-dim);transform:translateY(-1px)}
    .choice-btn.wrong{border-color:var(--error)!important;background:#ff446618!important;animation:choiceShake .35s ease}
    .choice-btn.correct{border-color:var(--success)!important;background:#00ffb318!important}
    @keyframes choiceShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

    /* Drag order */
    .drag-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
    .drag-item{
      background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      padding:10px 14px;font-family:var(--font-mono);font-size:.86rem;color:var(--text);
      cursor:grab;user-select:none;display:flex;align-items:center;gap:10px;
      transition:border-color .2s,box-shadow .2s;
    }
    .drag-item:active{cursor:grabbing}
    .drag-item.dragging{opacity:.4;border-color:var(--accent)}
    .drag-item.over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
    .drag-handle{color:var(--muted);font-size:.8rem}

    /* Slider */
    .slider-wrap{margin-bottom:4px}
    .slider-label{font-family:var(--font-mono);font-size:.78rem;color:var(--muted);margin-bottom:10px;display:block}
    .slider-row{display:flex;align-items:center;gap:12px}
    input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px var(--accent)}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
    .slider-val{font-family:var(--font-mono);font-size:1.1rem;color:var(--accent);font-weight:700;min-width:48px;text-align:right}

    /* Memory sequence */
    .seq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
    .seq-cell{
      aspect-ratio:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.5rem;
      transition:background .15s,border-color .15s,transform .15s;user-select:none;
    }
    .seq-cell:hover{border-color:var(--accent);transform:scale(1.04)}
    .seq-cell.flash{background:var(--accent)!important;border-color:var(--accent)!important}
    .seq-cell.wrong{background:#ff446630!important;border-color:var(--error)!important}
    .seq-hint{font-family:var(--font-mono);font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:10px;min-height:1.2em}

    /* Match/wire */
    .wire-wrap{position:relative;margin-bottom:4px}
    .wire-cols{display:flex;justify-content:space-between;gap:16px}
    .wire-col{display:flex;flex-direction:column;gap:8px;flex:1}
    .wire-item{
      background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      padding:9px 10px;font-family:var(--font-mono);font-size:.8rem;color:var(--text);
      cursor:pointer;user-select:none;transition:border-color .2s,background .2s;text-align:center;
    }
    .wire-item.selected{border-color:var(--accent);background:var(--accent-dim)}
    .wire-item.matched{border-color:var(--success);background:#00ffb318;color:var(--success);cursor:default}
    .wire-item.wrong-flash{animation:choiceShake .35s ease;border-color:var(--error)!important}

    /* Tile flip (new) */
    .flip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
    .flip-card{
      aspect-ratio:1;perspective:600px;cursor:pointer;user-select:none;
    }
    .flip-inner{
      position:relative;width:100%;height:100%;
      transform-style:preserve-3d;transition:transform .45s var(--ease);
    }
    .flip-card.flipped .flip-inner{transform:rotateY(180deg)}
    .flip-front,.flip-back{
      position:absolute;inset:0;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
      font-size:1.3rem;border:1px solid var(--border);
    }
    .flip-front{background:var(--surface2)}
    .flip-num{font-family:var(--font-mono);font-size:.75rem;color:var(--muted);pointer-events:none;}
    .flip-back{background:var(--accent-dim);border-color:var(--accent);transform:rotateY(180deg)}
    .flip-card.matched .flip-front,.flip-card.matched .flip-back{border-color:var(--success);background:#00ffb318}
    .flip-card.wrong-pair .flip-inner{animation:wrongFlip .5s ease}
    @keyframes wrongFlip{0%,100%{transform:rotateY(180deg)}50%{transform:rotateY(180deg) translateX(-6px)}}
    .flip-hint{font-family:var(--font-mono);font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:10px;min-height:1.2em}

    /* Type-the-word (new) */
    .typeword-wrap{margin-bottom:4px}
    .typeword-display{
      display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;
    }
    .typeword-letter{
      width:36px;height:44px;background:var(--surface2);border:1px solid var(--border);
      border-radius:6px;display:flex;align-items:center;justify-content:center;
      font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:var(--text);
      transition:background .2s,border-color .2s,color .2s;
    }
    .typeword-letter.filled{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
    .typeword-letter.correct-letter{border-color:var(--success);color:var(--success);background:#00ffb318}
    .typeword-letter.wrong-letter{border-color:var(--error);color:var(--error);background:#ff446618}
    .typeword-keyboard{display:flex;flex-direction:column;gap:6px}
    .kb-row{display:flex;gap:5px;justify-content:center}
    .kb-key{
      min-width:30px;height:36px;padding:0 4px;background:var(--surface2);
      border:1px solid var(--border);border-radius:5px;color:var(--text);
      font-family:var(--font-mono);font-size:.78rem;cursor:pointer;
      transition:background .15s,border-color .15s,transform .1s;user-select:none;
    }
    .kb-key:hover{background:var(--accent-dim);border-color:var(--accent)}
    .kb-key:active{transform:scale(.93)}
    .kb-key.used{opacity:.3;pointer-events:none}
    .kb-del{min-width:44px;color:var(--error)}



    /* ── PASSWORD DISPLAY ─────────────────────────────────────── */
    .pw-display-wrap{
      background:var(--bg);border:1px solid var(--border);border-radius:8px;
      padding:14px 16px;position:relative;
    }
    .pw-display{
      font-family:var(--font-mono);font-size:.82rem;color:var(--accent);
      letter-spacing:.06em;line-height:1.6;word-break:break-all;display:block;
      user-select:none;-webkit-user-select:none;-moz-user-select:none;
      pointer-events:none;
    }
    .pw-display-note{
      display:block;font-family:var(--font-mono);font-size:.62rem;color:var(--muted);
      margin-top:6px;
    }
    .input-row{position:relative;display:flex;gap:8px;align-items:center}
    .input-row .input{flex:1}
    .toggle-vis{
      flex-shrink:0;width:42px;height:42px;background:var(--surface2);
      border:1px solid var(--border);border-radius:8px;cursor:pointer;
      font-size:1.1rem;display:flex;align-items:center;justify-content:center;
      transition:background .2s,border-color .2s;
    }
    .toggle-vis:hover{background:var(--accent-dim);border-color:var(--accent)}

    /* ── WORDLE ──────────────────────────────────────────────── */
    .wordle-grid{display:flex;flex-direction:column;gap:5px;align-items:center;margin-bottom:12px}
    .wordle-row{display:flex;gap:5px}
    .wordle-cell{
      width:46px;height:46px;border:2px solid var(--border);border-radius:4px;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--font-mono);font-size:1.2rem;font-weight:700;color:#fff;
      text-transform:uppercase;transition:background .3s,border-color .3s;
      user-select:none;
    }
    .wordle-cell.filled{border-color:var(--muted)}
    .wordle-cell.correct{background:#538d4e;border-color:#538d4e}
    .wordle-cell.present{background:#b59f3b;border-color:#b59f3b}
    .wordle-cell.absent {background:#3a3a3c;border-color:#3a3a3c}
    .wordle-cell.active-row{border-color:var(--accent)}
    .wordle-keyboard{display:flex;flex-direction:column;gap:5px;align-items:center;margin-top:8px}
    .wordle-kb-row{display:flex;gap:4px}
    .wordle-key{
      min-width:32px;height:40px;padding:0 6px;background:var(--surface2);
      border:1px solid var(--border);border-radius:4px;color:var(--text);
      font-family:var(--font-mono);font-size:.78rem;font-weight:700;cursor:pointer;
      transition:background .2s,border-color .2s,transform .1s;user-select:none;
      display:flex;align-items:center;justify-content:center;
    }
    .wordle-key:hover{background:var(--accent-dim);border-color:var(--accent)}
    .wordle-key:active{transform:scale(.92)}
    .wordle-key.correct{background:#538d4e!important;border-color:#538d4e!important;color:#fff}
    .wordle-key.present{background:#b59f3b!important;border-color:#b59f3b!important;color:#fff}
    .wordle-key.absent {background:#3a3a3c!important;border-color:#3a3a3c!important;color:#6b6b80}
    .wordle-tries{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);text-align:center;margin-bottom:8px}
    @keyframes wPop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes wShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes wFlip{0%{transform:rotateX(0)}50%{transform:rotateX(-90deg)}100%{transform:rotateX(0)}}

    /* ── SNAKE ───────────────────────────────────────────────── */
    .snake-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:4px}
    .snake-hud{display:flex;justify-content:space-between;width:100%;font-family:var(--font-mono);font-size:.75rem;color:var(--muted);padding:0 2px}
    .snake-hud span{color:var(--accent);font-weight:700}
    canvas#snakeCanvas{
      background:var(--bg);border:1px solid var(--border);border-radius:8px;
      display:block;touch-action:none;
    }
    .snake-overlay{
      position:relative;width:280px;
    }
    .snake-msg{
      position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
      justify-content:center;background:#0a0a0fcc;border-radius:8px;
      font-family:var(--font-mono);font-size:.85rem;color:#fff;gap:10px;
      pointer-events:none;
    }
    .snake-msg.hidden{display:none}
    .snake-start-btn{
      pointer-events:all;background:var(--accent);color:#000;border:none;
      border-radius:6px;padding:8px 20px;font-family:var(--font-display);
      font-weight:700;font-size:.9rem;cursor:pointer;
    }
    .snake-dpad{display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(2,40px);gap:4px;margin-top:4px}
    .dpad-btn{
      background:var(--surface2);border:1px solid var(--border);border-radius:6px;
      color:var(--text);font-size:1rem;cursor:pointer;display:flex;
      align-items:center;justify-content:center;user-select:none;
      transition:background .1s;
    }
    .dpad-btn:active{background:var(--accent-dim)}
    .dpad-up{grid-column:2;grid-row:1}
    .dpad-left{grid-column:1;grid-row:2}
    .dpad-down{grid-column:2;grid-row:2}
    .dpad-right{grid-column:3;grid-row:2}

    @media(max-width:520px){
      .card{padding:28px 20px}
      h1{font-size:1.4rem}
      .choices{grid-template-columns:1fr}
      .flip-grid{grid-template-columns:repeat(4,1fr);gap:6px}
      .typeword-letter{width:30px;height:38px;font-size:.95rem}
      .kb-key{min-width:26px;height:32px;font-size:.72rem}
    }
  </style>
</head>
<body>

//  STATE
// ════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════
//  CRYPTO ENGINE  (AES-GCM via Web Crypto API)
//  All answers are encrypted at init. Raw strings are never kept
//  in memory — only ciphertext. Decryption happens only at check time.
// ════════════════════════════════════════════════════════════════
const _CK = crypto.getRandomValues(new Uint8Array(32)); // session key, never exposed
let _encryptedPasswordList = [];  // encrypted forms of PASSWORD_LIST
let _encryptedCorrect      = null;// encrypted CORRECT_PASSWORD
let _encryptedPuzzleBank   = [];  // parallel array of encrypted answers

async function _enc(plain) {
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const key = await crypto.subtle.importKey('raw', _CK, 'AES-GCM', false, ['encrypt']);
  const ct  = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(plain));
  return {iv, ct: new Uint8Array(ct)};
}

async function _dec(blob) {
  const key = await crypto.subtle.importKey('raw', _CK, 'AES-GCM', false, ['decrypt']);
  const pt  = await crypto.subtle.decrypt({name:'AES-GCM', iv: blob.iv}, key, blob.ct);
  return new TextDecoder().decode(pt);
}

async function _match(blob, candidate) {
  const plain = await _dec(blob);
  return plain === candidate;
}

async function _matchCI(blob, candidate) {
  const plain = await _dec(blob);
  return plain.toLowerCase() === candidate.toLowerCase();
}

// Encrypt everything at startup — wipe plain-text references afterwards
async function initCrypto() {
  // Encrypt every password in the list
  _encryptedPasswordList = await Promise.all(PASSWORD_LIST.map(pw => _enc(pw)));
  // Encrypt the chosen correct password
  _encryptedCorrect = await _enc(CORRECT_PASSWORD);

  // Encrypt puzzle answers in PUZZLE_BANK
  _encryptedPuzzleBank = await Promise.all(PUZZLE_BANK.map(async p => {
    if (p.answer !== undefined) return _enc(String(p.answer));
    return null; // puzzles like wire/seq/flip/snake/wordle check differently
  }));

  // Only wipe the PASSWORD_LIST — puzzle answers stay intact for
  // structural comparisons (choice buttons, order arrays, wire pairs).
  // Text/slider/wordle/typeword answers are verified via _encryptedPuzzleBank.
  PASSWORD_LIST.fill('███');
  // CORRECT_PASSWORD is a const — it's only used via _encryptedCorrect after this point.
}

// Helper used by checkPassword
async function checkPasswordMatch(input) {
  return _match(_encryptedCorrect, input);
}

// Helper used by checkPuzzle — pass puzzleIndex
async function checkPuzzleAnswer(idx, candidate) {
  if (!_encryptedPuzzleBank[idx]) return false;
  return _matchCI(_encryptedPuzzleBank[idx], candidate);
}

let puzzleQueue  = [];
let puzzleIndex  = 0;
const usedPuzzleIds = new Set(); // questions seen this session (pass or fail — never repeat)

// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function showMsg(el,type,text){el.className='msg '+type;el.textContent=text}
function clearMsg(el){el.className='msg';el.textContent=''}
function setInput(el,state){el.classList.remove('ok','error');if(state)el.classList.add(state)}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5)}
function shake(el){el.animate([{transform:'translateX(0)'},{transform:'translateX(-8px)'},{transform:'translateX(8px)'},{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(0)'}],{duration:380,easing:'ease-out'})}

// ════════════════════════════════════════════════════════════════
//  PICK 5 PUZZLES — all different uiTypes
// ════════════════════════════════════════════════════════════════
function pickPuzzles(){
  // Only pick from puzzles not yet seen this session
  const available = PUZZLE_BANK.filter(p => !usedPuzzleIds.has(p.question));
  const pool = available.length >= TOTAL_PUZZLES ? available : PUZZLE_BANK; // fallback if exhausted
  const shuffled = shuffle(pool);
  const chosen   = [];
  const usedTypes = new Set();
  for(const p of shuffled){
    if(!usedTypes.has(p.uiType)){chosen.push(p);usedTypes.add(p.uiType)}
    if(chosen.length===TOTAL_PUZZLES)break;
  }
  while(chosen.length<TOTAL_PUZZLES){
    const lastType=chosen[chosen.length-1].uiType;
    const usedQs=new Set(chosen.map(p=>p.question));
    const candidates=shuffle(pool).filter(p=>p.uiType!==lastType&&!usedQs.has(p.question));
    chosen.push(candidates[0]||shuffle(pool).find(p=>!usedQs.has(p.question))||pool[0]);
  }
  return ensureNoConsecutiveSameType(chosen);
}

function ensureNoConsecutiveSameType(arr){
  // Fisher-Yates shuffle with constraint: swap if neighbour types match
  const a=[...arr];
  for(let attempts=0;attempts<200;attempts++){
    let ok=true;
    for(let i=1;i<a.length;i++){
      if(a[i].uiType===a[i-1].uiType){
        ok=false;
        // find a swap target that fixes both spots
        for(let j=i+1;j<a.length;j++){
          if(a[j].uiType!==a[i-1].uiType&&(j+1>=a.length||a[j+1].uiType!==a[i].uiType)){
            [a[i],a[j]]=[a[j],a[i]];break;
          }
        }
      }
    }
    if(ok)break;
  }
  return a;
}

function renderPasswordDisplay(){

function togglePasswordVis(){

  if(inp.type === 'password'){
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁';
  }
}

function checkPassword(){
  const val=document.getElementById('passwordInput').value;
  const input=document.getElementById('passwordInput');
  const msg=document.getElementById('passMsg');

  // Check if timed out
  const lockUntil=parseInt(localStorage.getItem('vaultLockUntil')||'0');
  if(Date.now()<lockUntil){
    const secsLeft=Math.ceil((lockUntil-Date.now())/1000);
    const mins=Math.floor(secsLeft/60), secs=secsLeft%60;
    showMsg(msg,'error',`Too many failed attempts. Try again in ${mins}m ${secs}s.`);
    input.disabled=true;
    startLockCountdown(lockUntil,msg,input);
    return;
  }

  if(!val.trim()){showMsg(msg,'error','Please enter the access password.');return}

  checkPasswordMatch(val).then(isCorrect => {
  if(isCorrect){
    localStorage.removeItem('vaultPassFails');
    localStorage.removeItem('vaultLockUntil');
    setInput(input,'ok');
    showMsg(msg,'success','Password accepted — loading your challenges...');
    setTimeout(()=>{puzzleQueue=pickPuzzles();puzzleIndex=0;loadPuzzle();showStep('step-puzzle')},650);
  }else{
    const fails=(parseInt(localStorage.getItem('vaultPassFails')||'0'))+1;
    localStorage.setItem('vaultPassFails',fails);
    setInput(input,'error');
    shake(input);
    if(fails>=2){
      const lockUntil=Date.now()+2*60*1000; // 2 minutes
      localStorage.setItem('vaultLockUntil',lockUntil);
      localStorage.removeItem('vaultPassFails');
      input.disabled=true;
      showMsg(msg,'error','Too many failed attempts — locked for 2 minutes.');
      startLockCountdown(lockUntil,msg,input);
    }else{
      showMsg(msg,'error',`Incorrect password. ${2-fails} attempt${2-fails!==1?'s':''} remaining before lockout.`);
    }
  }
  }); // end checkPasswordMatch
}

function startLockCountdown(lockUntil,msg,input){
  const tick=()=>{
    const secsLeft=Math.ceil((lockUntil-Date.now())/1000);
    if(secsLeft<=0){
      localStorage.removeItem('vaultLockUntil');
      localStorage.removeItem('vaultPassFails');
      input.disabled=false;
      showMsg(msg,'success','Lockout lifted — you can try again.');
      setInput(input,'');
      return;
    }
    const mins=Math.floor(secsLeft/60),secs=secsLeft%60;
    showMsg(msg,'error',`Locked out. Try again in ${mins}m ${String(secs).padStart(2,'0')}s.`);
    setTimeout(tick,1000);
  };
  tick();
}


// ════════════════════════════════════════════════════════════════
//  ADVANCE TO NEXT PUZZLE OR DOWNLOAD
// ════════════════════════════════════════════════════════════════
function advancePuzzle(){
  // Mark this puzzle as used so it never appears again this session
  usedPuzzleIds.add(puzzleQueue[puzzleIndex].question);
  puzzleIndex++;
  const remaining=TOTAL_PUZZLES-puzzleIndex;
  if(puzzleIndex<TOTAL_PUZZLES){
    showMsg(document.getElementById('puzzleMsg'),'success',`Correct! ${remaining} challenge${remaining>1?'s':''} remaining...`);
    setTimeout(()=>{showStep('step-puzzle');loadPuzzle()},900);
  }else{
    showMsg(document.getElementById('puzzleMsg'),'success','All 5 challenges solved! Unlocking...');
    setTimeout(()=>showStep('step-download'),900);
  }
}

// FAIL A PUZZLE: step back one, replace that slot with a new puzzle of same type
function failPuzzle(){
  // Mark the failed puzzle as used — it won't appear again this session
  usedPuzzleIds.add(puzzleQueue[puzzleIndex].question);
  const failedType=puzzleQueue[puzzleIndex].uiType;
  // Step back (never below 0)
  puzzleIndex=Math.max(0,puzzleIndex-1);
  // Determine forbidden types: different from failed, previous, and next
  const forbidden=new Set([failedType]);
  if(puzzleIndex>0) forbidden.add(puzzleQueue[puzzleIndex-1].uiType);
  if(puzzleIndex<puzzleQueue.length-1) forbidden.add(puzzleQueue[puzzleIndex+1].uiType);
  // Pick a fresh puzzle: not used this session, not a forbidden type
  const candidates=shuffle(PUZZLE_BANK).filter(p=>!forbidden.has(p.uiType)&&!usedPuzzleIds.has(p.question));
  const fallback=shuffle(PUZZLE_BANK).filter(p=>!forbidden.has(p.uiType));
  puzzleQueue[puzzleIndex]=candidates[0]||fallback[0]||shuffle(PUZZLE_BANK)[0];
  const goingTo=puzzleIndex+1;
  showMsg(document.getElementById('puzzleMsg'),'error',
    `Wrong! Sent back to Challenge ${goingTo} with a new puzzle...`);
  setTimeout(()=>{showStep('step-puzzle');loadPuzzle();},1400);
}

// ════════════════════════════════════════════════════════════════
//  LOAD PUZZLE
// ════════════════════════════════════════════════════════════════
function loadPuzzle(){
  const p=puzzleQueue[puzzleIndex];

  document.getElementById('puzzleCounter').textContent =`Challenge ${puzzleIndex+1} of ${TOTAL_PUZZLES}`;
  document.getElementById('puzzleType').textContent    ='// '+p.label;
  document.getElementById('puzzleQuestion').textContent=p.question;

  for(let i=1;i<=TOTAL_PUZZLES;i++){
    const pip=document.getElementById('pip'+i);
    pip.className='pip';
    if(i===puzzleIndex+1)pip.classList.add('active');
    if(i<puzzleIndex+1)  pip.classList.add('done');
  }

  clearMsg(document.getElementById('puzzleMsg'));

  const widget    =document.getElementById('puzzleWidget');
  const textArea  =document.getElementById('puzzleTextArea');
  const submitBtn =document.getElementById('puzzleSubmitBtn');
  widget.innerHTML='';
  textArea.style.display='none';
  submitBtn.style.display='';
  submitBtn.textContent='Check Answer →';

  if(p.uiType==='text'){
    textArea.style.display='';
    const inp=document.getElementById('puzzleInput');
    inp.value='';setInput(inp,'');inp.focus();

  }else if(p.uiType==='choice'){
    submitBtn.style.display='none';
    buildChoiceWidget(p,widget);

  }else if(p.uiType==='order'){
    submitBtn.textContent='Confirm Order →';
    buildOrderWidget(p,widget);

  }else if(p.uiType==='slider'){
    submitBtn.textContent='Lock In Answer →';
    buildSliderWidget(p,widget);

  }else if(p.uiType==='seq'){
    submitBtn.style.display='none';
    buildSeqWidget(p,widget);

  }else if(p.uiType==='wire'){
    submitBtn.style.display='none';
    buildWireWidget(p,widget);

  }else if(p.uiType==='flip'){
    submitBtn.style.display='none';
    buildFlipWidget(p,widget);

  }else if(p.uiType==='typeword'){
    submitBtn.style.display='none';
    buildTypeWordWidget(p,widget);

  }else if(p.uiType==='wordle'){
    submitBtn.style.display='none';
    buildWordleWidget(p,widget);

  }else if(p.uiType==='snake'){
    submitBtn.style.display='none';
    buildSnakeWidget(p,widget);
  }
}

// ════════════════════════════════════════════════════════════════
//  CHECK PUZZLE (text / order / slider)
//  BACKEND HOOK: replace with fetch('/api/verify-puzzle',...)
// ════════════════════════════════════════════════════════════════
function checkPuzzle(){
  const p  =puzzleQueue[puzzleIndex];
  const msg=document.getElementById('puzzleMsg');

  if(p.uiType==='text'){
    const raw=document.getElementById('puzzleInput').value.trim();
    const inp=document.getElementById('puzzleInput');
    if(!raw){showMsg(msg,'error','Please enter an answer.');return}
    const bankIdx=PUZZLE_BANK.indexOf(p);
    checkPuzzleAnswer(bankIdx,raw).then(ok=>{
      if(ok){setInput(inp,'ok');advancePuzzle();}
      else{setInput(inp,'error');failPuzzle();}
    });
    return;

  }else if(p.uiType==='order'){
    const current=[...document.querySelectorAll('.drag-item')].map(el=>el.dataset.val);
    if(JSON.stringify(current)===JSON.stringify(p.answer)){advancePuzzle();}
    else{failPuzzle();}

  }else if(p.uiType==='slider'){
    const val=parseInt(document.getElementById('puzzleSlider').value);
    const sIdx=PUZZLE_BANK.indexOf(p);
    checkPuzzleAnswer(sIdx,String(val)).then(ok=>{
      if(ok){advancePuzzle();}else{failPuzzle();}
    });
    return;
  }
}

function buildChoiceWidget(p,container){
  const grid=document.createElement('div');
  grid.className='choices';
  shuffle(p.options).forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=opt;
    btn.addEventListener('click',()=>{
      if(btn.classList.contains('correct'))return;
      if(opt===p.answer){btn.classList.add('correct');advancePuzzle();}
      else{
        btn.classList.add('wrong');
        setTimeout(()=>{btn.classList.remove('wrong');failPuzzle();},500);
      }
    });
    grid.appendChild(btn);
  });
  container.appendChild(grid);
}

//  WIDGET: DRAG-AND-DROP ORDER
// ════════════════════════════════════════════════════════════════
function buildOrderWidget(p,container){
  const list=document.createElement('div');
  list.className='drag-list';
  let items=shuffle(p.items);
  let attempts=0;
  while(JSON.stringify(items)===JSON.stringify(p.answer)&&attempts<10){items=shuffle(p.items);attempts++;}
  items.forEach(val=>{
    const item=document.createElement('div');
    item.className='drag-item';item.draggable=true;item.dataset.val=val;
    item.innerHTML=`<span class="drag-handle">⠿</span>${val}`;
    addDragEvents(item,list);
    list.appendChild(item);
  });
  container.appendChild(list);
}
function addDragEvents(item,list){
  item.addEventListener('dragstart',()=>item.classList.add('dragging'));
  item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('over'))});
  item.addEventListener('dragover',e=>{
    e.preventDefault();
    const dragging=list.querySelector('.dragging');
    if(!dragging||dragging===item)return;
    list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('over'));
    item.classList.add('over');
    const mid=item.getBoundingClientRect().top+item.getBoundingClientRect().height/2;
    if(e.clientY<mid)list.insertBefore(dragging,item);else list.insertBefore(dragging,item.nextSibling);
  });
  let tClone=null,tOX=0,tOY=0;
  item.addEventListener('touchstart',e=>{
    const t=e.touches[0],r=item.getBoundingClientRect();
    tOX=t.clientX-r.left;tOY=t.clientY-r.top;
    tClone=item.cloneNode(true);
    tClone.style.cssText=`position:fixed;opacity:.7;pointer-events:none;width:${r.width}px;z-index:9999`;
    document.body.appendChild(tClone);item.classList.add('dragging');
  },{passive:true});
  item.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.touches[0];
    if(tClone){tClone.style.left=(t.clientX-tOX)+'px';tClone.style.top=(t.clientY-tOY)+'px';}
    const over=document.elementsFromPoint(t.clientX,t.clientY).find(el=>el.classList.contains('drag-item')&&el!==item);
    if(over){
      list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('over'));
      over.classList.add('over');
      const r=over.getBoundingClientRect();
      if(t.clientY<r.top+r.height/2)list.insertBefore(item,over);else list.insertBefore(item,over.nextSibling);
    }
  },{passive:false});
  item.addEventListener('touchend',()=>{
    item.classList.remove('dragging');
    list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('over'));
    if(tClone){tClone.remove();tClone=null;}
  });
}

function buildSliderWidget(p,container){

  const row=document.createElement('div');row.className='slider-row';

// ════════════════════════════════════════════════════════════════
//  WIDGET: MEMORY SEQUENCE
// ════════════════════════════════════════════════════════════════
function buildSeqWidget(p,container){
  const hint=document.createElement('div');hint.className='seq-hint';hint.id='seqHint';hint.textContent='Watch the sequence…';
  const grid=document.createElement('div');grid.className='seq-grid';
  p.emojis.forEach((emoji,idx)=>{
    const cell=document.createElement('div');
    cell.className='seq-cell';cell.textContent=emoji;cell.dataset.idx=idx;
    grid.appendChild(cell);
  });
  container.appendChild(hint);container.appendChild(grid);
  const cells=[...grid.querySelectorAll('.seq-cell')];
  let userInput=[],accepting=false;
  function flash(idx,delay){
    return new Promise(res=>setTimeout(()=>{
      cells[idx].classList.add('flash');
      setTimeout(()=>{cells[idx].classList.remove('flash');res()},500);
    },delay));
  }
  async function playSequence(){
    hint.textContent='Watch the sequence…';
    cells.forEach(c=>c.style.pointerEvents='none');
    await new Promise(r=>setTimeout(r,600));
    for(let i=0;i<p.sequence.length;i++)await flash(p.sequence[i],i*700);
    await new Promise(r=>setTimeout(r,400));
    hint.textContent=`Now tap the ${p.sequence.length} tiles in order!`;
    userInput=[];accepting=true;
    cells.forEach(c=>c.style.pointerEvents='');
  }
  cells.forEach(cell=>{
    cell.addEventListener('click',()=>{
      if(!accepting)return;
      const idx=parseInt(cell.dataset.idx);
      userInput.push(idx);
      cell.classList.add('flash');setTimeout(()=>cell.classList.remove('flash'),300);
      const step=userInput.length-1;
      if(userInput[step]!==p.sequence[step]){
        accepting=false;cell.classList.add('wrong');
        hint.textContent='Wrong!';
        setTimeout(()=>{cell.classList.remove('wrong');failPuzzle();},700);
        return;
      }
      if(userInput.length===p.sequence.length){accepting=false;hint.textContent='✓ Correct!';advancePuzzle();}
      else hint.textContent=`${userInput.length} / ${p.sequence.length} correct…`;
    });
  });
  playSequence();
}

// ════════════════════════════════════════════════════════════════
//  WIDGET: MATCH / WIRE
// ════════════════════════════════════════════════════════════════
function buildWireWidget(p,container){
  const MAX_ATTEMPTS = 2;
  const leftItems =shuffle(p.pairs.map(pr=>pr.left));
  const rightItems=shuffle(p.pairs.map(pr=>pr.right));
  const pairMap={};p.pairs.forEach(pr=>{pairMap[pr.left]=pr.right});
  const wrap=document.createElement('div');wrap.className='wire-wrap';

  // Attempts counter bar
  const attemptsBar=document.createElement('div');
  attemptsBar.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;';
  const attemptsLabel=document.createElement('span');
  attemptsLabel.id='wireAttemptsLabel';
  attemptsLabel.style.cssText='font-family:var(--font-mono);font-size:.7rem;color:var(--muted);';
  attemptsLabel.textContent='Attempts: 0 / '+MAX_ATTEMPTS;
  const pipRow=document.createElement('div');pipRow.style.cssText='display:flex;gap:4px;';
  const attemptPips=[];
  for(let i=0;i<MAX_ATTEMPTS;i++){
    const pip=document.createElement('div');
    pip.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s;';
    pipRow.appendChild(pip);attemptPips.push(pip);
  }
  attemptsBar.appendChild(attemptsLabel);attemptsBar.appendChild(pipRow);
  wrap.appendChild(attemptsBar);

  const cols=document.createElement('div');cols.className='wire-cols';
  const leftCol=document.createElement('div');leftCol.className='wire-col';
  const rightCol=document.createElement('div');rightCol.className='wire-col';
  let selectedLeft=null;const matched=new Set();
  let attempts=0;

  function updateAttempts(wasWrong){
    if(wasWrong){
      const pip=attemptPips[attempts];
      if(pip)pip.style.background='var(--error)';
      attempts++;
      attemptsLabel.textContent='Attempts: '+attempts+' / '+MAX_ATTEMPTS;
      attemptsLabel.style.color=attempts>=MAX_ATTEMPTS-2?'var(--error)':'var(--muted)';
      if(attempts>=MAX_ATTEMPTS){
        setTimeout(()=>failPuzzle(),600);
        return true; // failed
      }
    }else{
      // correct match — fill pip green
      const pip=attemptPips[attempts];
      if(pip)pip.style.background='var(--success)';
    }
    return false;
  }

  function makeItem(text,side,col){
    const el=document.createElement('div');
    el.className='wire-item';el.textContent=text;el.dataset.val=text;
    el.addEventListener('click',()=>{
      if(el.classList.contains('matched'))return;
      if(side==='left'){
        leftCol.querySelectorAll('.wire-item').forEach(i=>i.classList.remove('selected'));
        el.classList.add('selected');selectedLeft=text;
      }else if(side==='right'&&selectedLeft){
        if(pairMap[selectedLeft]===text){
          const lEl=[...leftCol.querySelectorAll('.wire-item')].find(i=>i.dataset.val===selectedLeft);
          lEl.classList.remove('selected');lEl.classList.add('matched');el.classList.add('matched');
          matched.add(selectedLeft);selectedLeft=null;
          updateAttempts(false);
          if(matched.size===p.pairs.length)setTimeout(()=>advancePuzzle(),400);
        }else{
          const lEl=[...leftCol.querySelectorAll('.wire-item')].find(i=>i.dataset.val===selectedLeft);
          [lEl,el].forEach(e=>{e.classList.add('wrong-flash');setTimeout(()=>e.classList.remove('wrong-flash'),400)});
          lEl.classList.remove('selected');selectedLeft=null;
          const failed=updateAttempts(true);
          if(!failed){
            const remaining=MAX_ATTEMPTS-attempts;
            showMsg(document.getElementById('puzzleMsg'),'error',
              `Not a match! ${remaining} attempt${remaining!==1?'s':''} remaining.`);
            setTimeout(()=>clearMsg(document.getElementById('puzzleMsg')),1200);
          }
        }
      }
    });
    col.appendChild(el);
  }
  leftItems.forEach(t=>makeItem(t,'left',leftCol));
  rightItems.forEach(t=>makeItem(t,'right',rightCol));
  cols.appendChild(leftCol);cols.appendChild(rightCol);
  wrap.appendChild(cols);container.appendChild(wrap);
}

// ════════════════════════════════════════════════════════════════
//  WIDGET: FLIP / MEMORY MATCH
// ════════════════════════════════════════════════════════════════
function buildFlipWidget(p,container){
  const MAX_FLIP_ATTEMPTS = 10;
  let flipAttempts = 0;

  const hint=document.createElement('div');hint.className='flip-hint';hint.id='flipHint';
  hint.textContent='Find all 4 matching pairs! (Click tiles or press 1-8)';

  // Attempts bar
  const attemptsBar=document.createElement('div');
  attemptsBar.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
  const attemptsLabel=document.createElement('span');
  attemptsLabel.style.cssText='font-family:var(--font-mono);font-size:.7rem;color:var(--muted);';
  attemptsLabel.textContent='Mismatches: 0 / '+MAX_FLIP_ATTEMPTS;
  const pipRow=document.createElement('div');pipRow.style.cssText='display:flex;gap:4px;';
  const attemptPips=[];
  for(let i=0;i<MAX_FLIP_ATTEMPTS;i++){
    const pip=document.createElement('div');
    pip.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s;';
    pipRow.appendChild(pip);attemptPips.push(pip);
  }
  attemptsBar.appendChild(attemptsLabel);attemptsBar.appendChild(pipRow);

  const grid=document.createElement('div');grid.className='flip-grid';

  const tiles=shuffle([...p.pairs,...p.pairs]);
  let flipped=[],matched=0,locked=false;
  const cardEls=[];

  tiles.forEach((emoji,i)=>{
    const card=document.createElement('div');card.className='flip-card';
    card.dataset.emoji=emoji;card.dataset.idx=i;
    card.innerHTML=`<div class="flip-inner"><div class="flip-front"><span class="flip-num">${i+1}</span></div><div class="flip-back">${emoji}</div></div>`;
    card.addEventListener('click',()=>flipCard(card));
    cardEls.push(card);
    grid.appendChild(card);
  });

  function flipCard(card){
    if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
    card.classList.add('flipped');flipped.push(card);
    if(flipped.length===2){
      locked=true;
      const[a,b]=flipped;
      if(a.dataset.emoji===b.dataset.emoji){
        a.classList.add('matched');b.classList.add('matched');
        matched++;flipped=[];locked=false;
        const left=p.pairs.length-matched;
        hint.textContent=matched===p.pairs.length?'All matched!':''+left+' pair'+(left>1?'s':'')+' left...';
        if(matched===p.pairs.length)setTimeout(()=>advancePuzzle(),500);
      }else{
        // Wrong pair — use an attempt
        if(attemptPips[flipAttempts])attemptPips[flipAttempts].style.background='var(--error)';
        flipAttempts++;
        const remaining=MAX_FLIP_ATTEMPTS-flipAttempts;
        attemptsLabel.textContent='Mismatches: '+flipAttempts+' / '+MAX_FLIP_ATTEMPTS;
        attemptsLabel.style.color=remaining<=2?'var(--error)':'var(--muted)';
        hint.textContent='No match! '+remaining+' mistake'+(remaining!==1?'s':'')+' left.';
        if(flipAttempts>=MAX_FLIP_ATTEMPTS){
          // Out of attempts — fail immediately, no flip-back
          locked=true;
          setTimeout(()=>failPuzzle(),700);
        }else{
          setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];locked=false;},900);
        }
      }
    }
  }

  // Physical keyboard: press 1-8 to flip the corresponding tile
  let kbListener=function(e){
    if(!document.getElementById('step-puzzle').classList.contains('active'))return;
    if(e.ctrlKey||e.metaKey)return;
    const n=parseInt(e.key);
    if(n>=1&&n<=cardEls.length){
      e.preventDefault();
      flipCard(cardEls[n-1]);
    }
  };
  document.addEventListener('keydown',kbListener);

  new MutationObserver(()=>{
    if(!document.body.contains(grid)){
      document.removeEventListener('keydown',kbListener);
    }
  }).observe(document.getElementById('puzzleWidget'),{childList:true});

  container.appendChild(attemptsBar);
  container.appendChild(hint);
  container.appendChild(grid);
}



// ════════════════════════════════════════════════════════════════
//  WIDGET: TYPE THE WORD (on-screen keyboard)
// ════════════════════════════════════════════════════════════════
function buildTypeWordWidget(p,container){
  const bankIdx2 = PUZZLE_BANK.indexOf(p);
  _dec(_encryptedPuzzleBank[bankIdx2]).then(plainTW => {
  const answer=plainTW.toUpperCase();
  let typed='';
  let inputLocked=false;
  let kbListener=null;

  const wrap=document.createElement('div');wrap.className='typeword-wrap';

  // Letter display boxes
  const display=document.createElement('div');display.className='typeword-display';
  answer.split('').forEach(()=>{
    const box=document.createElement('div');box.className='typeword-letter';box.textContent='_';
    display.appendChild(box);
  });
  wrap.appendChild(display);

  // Hint: how many characters
  const hint=document.createElement('div');
  hint.style.cssText='font-family:var(--font-mono);font-size:.7rem;color:var(--muted);text-align:center;margin-top:8px;';
  hint.textContent=answer.length+' characters — type with your keyboard, Backspace to delete';
  wrap.appendChild(hint);

  function updateDisplay(){
    const boxes=[...display.querySelectorAll('.typeword-letter')];
    boxes.forEach((box,i)=>{
      box.className='typeword-letter';
      if(i<typed.length){box.textContent=typed[i];box.classList.add('filled');}
      else box.textContent='_';
    });
  }

  function handleKey(k){
    if(inputLocked)return;
    if(k==='BACKSPACE'){
      typed=typed.slice(0,-1);updateDisplay();
    }else if(/^[A-Z0-9]$/.test(k)&&typed.length<answer.length){
      typed+=k;updateDisplay();
      if(typed.length===answer.length){
        inputLocked=true;
        const boxes=[...display.querySelectorAll('.typeword-letter')];
        if(typed===answer){
          boxes.forEach(b=>{b.classList.remove('filled');b.classList.add('correct-letter')});
          setTimeout(()=>advancePuzzle(),600);
        }else{
          boxes.forEach(b=>{b.classList.remove('filled');b.classList.add('wrong-letter')});
          // Unlock after flash so failPuzzle can clean up properly
          setTimeout(()=>{inputLocked=false;failPuzzle();},800);
        }
      }
    }
  }

  // Physical keyboard only — no on-screen keyboard
  kbListener=function(e){
    if(!document.getElementById('step-puzzle').classList.contains('active'))return;
    if(e.ctrlKey||e.metaKey||e.altKey)return;
    const k=e.key.toUpperCase();
    if(k==='BACKSPACE'||/^[A-Z0-9]$/.test(k)){
      e.preventDefault();
      handleKey(k);
    }
  };
  document.addEventListener('keydown',kbListener);

  // Clean up listener when widget is swapped out
  const observer=new MutationObserver(()=>{
    if(!document.body.contains(wrap)){
      document.removeEventListener('keydown',kbListener);
      observer.disconnect();
    }
  });
  observer.observe(document.getElementById('puzzleWidget'),{childList:true});

  container.appendChild(wrap);
  }); // end _dec promise
}

function buildWordleWidget(p, container) {
  const MAX_TRIES = 8;
  const WORD_LEN  = 5;
  const bankIdx   = PUZZLE_BANK.indexOf(p);
  // Decrypt the answer async, then build the widget
  _dec(_encryptedPuzzleBank[bankIdx]).then(plainAnswer => {
  const answer = plainAnswer.toUpperCase();
  let currentRow  = 0;
  let currentTile = 0;
  let board       = Array.from({length: MAX_TRIES}, () => Array(WORD_LEN).fill(''));
  let gameOver    = false;

  // ── Grid ────────────────────────────────────────────────────
  const triesEl = document.createElement('div');
  triesEl.className = 'wordle-tries';
  triesEl.textContent = `Attempt 1 of ${MAX_TRIES}`;

  const grid = document.createElement('div');
  grid.className = 'wordle-grid';
  const cellEls = [];
  for (let r = 0; r < MAX_TRIES; r++) {
    const row = document.createElement('div');
    row.className = 'wordle-row';
    const rowCells = [];
    for (let c = 0; c < WORD_LEN; c++) {
      const cell = document.createElement('div');
      cell.className = 'wordle-cell' + (r === 0 ? ' active-row' : '');
      row.appendChild(cell);
      rowCells.push(cell);
    }
    grid.appendChild(row);
    cellEls.push(rowCells);
  }

  // ── On-screen keyboard ───────────────────────────────────────
  const kbRows = [['Q','W','E','R','T','Y','U','I','O','P'],
                  ['A','S','D','F','G','H','J','K','L'],
                  ['ENTER','Z','X','C','V','B','N','M','⌫']];
  const kb = document.createElement('div');
  kb.className = 'wordle-keyboard';
  const keyMap = {};
  kbRows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'wordle-kb-row';
    row.forEach(k => {
      const btn = document.createElement('div');
      btn.className = 'wordle-key';
      btn.textContent = k;
      btn.style.minWidth = (k === 'ENTER' || k === '⌫') ? '52px' : '32px';
      btn.addEventListener('click', () => handleKey(k));
      rowEl.appendChild(btn);
      keyMap[k] = btn;
    });
    kb.appendChild(rowEl);
  });

  // ── Key logic ────────────────────────────────────────────────
  function handleKey(k) {
    if (gameOver) return;
    if (k === '⌫' || k === 'BACKSPACE') {
      if (currentTile > 0) {
        currentTile--;
        board[currentRow][currentTile] = '';
        cellEls[currentRow][currentTile].textContent = '';
        cellEls[currentRow][currentTile].classList.remove('filled');
      }
    } else if (k === 'ENTER') {
      submitGuess();
    } else if (/^[A-Z]$/.test(k) && currentTile < WORD_LEN) {
      board[currentRow][currentTile] = k;
      const cell = cellEls[currentRow][currentTile];
      cell.textContent = k;
      cell.classList.add('filled');
      cell.style.animation = 'wPop .15s ease';
      setTimeout(() => cell.style.animation = '', 200);
      currentTile++;
    }
  }

  function submitGuess() {
    if (currentTile < WORD_LEN) {
      // Shake row
      cellEls[currentRow].forEach(c => { c.style.animation = 'wShake .4s ease'; setTimeout(() => c.style.animation = '', 500); });
      showMsg(document.getElementById('puzzleMsg'), 'error', 'Not enough letters!');
      setTimeout(() => clearMsg(document.getElementById('puzzleMsg')), 1000);
      return;
    }
    const guess = board[currentRow].join('');
    if (!VALID_WORDS.has(guess)) {
      cellEls[currentRow].forEach(c => { c.style.animation = 'wShake .4s ease'; setTimeout(() => c.style.animation = '', 500); });
      showMsg(document.getElementById('puzzleMsg'), 'error', 'Not a valid word!');
      setTimeout(() => clearMsg(document.getElementById('puzzleMsg')), 1000);
      return;
    }

    // Score the guess
    const result = Array(WORD_LEN).fill('absent');
    const ansArr = answer.split('');
    const gArr   = guess.split('');
    // First pass: correct
    gArr.forEach((ch, i) => { if (ch === ansArr[i]) { result[i] = 'correct'; ansArr[i] = null; gArr[i] = null; } });
    // Second pass: present
    gArr.forEach((ch, i) => {
      if (!ch) return;
      const j = ansArr.indexOf(ch);
      if (j !== -1) { result[i] = 'present'; ansArr[j] = null; }
    });

    // Animate cells flipping in sequence
    result.forEach((state, i) => {
      setTimeout(() => {
        const cell = cellEls[currentRow][i];
        cell.style.animation = 'wFlip .5s ease';
        setTimeout(() => { cell.classList.add(state); cell.style.animation = ''; }, 250);
        // Update keyboard key colour (only upgrade: correct > present > absent)
        const btn = keyMap[board[currentRow][i]];
        if (btn) {
          const cur = btn.classList;
          if (state === 'correct') { cur.remove('present','absent'); cur.add('correct'); }
          else if (state === 'present' && !cur.contains('correct')) { cur.remove('absent'); cur.add('present'); }
          else if (state === 'absent' && !cur.contains('correct') && !cur.contains('present')) cur.add('absent');
        }
      }, i * 120);
    });

    const won = result.every(r => r === 'correct');
    currentRow++;
    currentTile = 0;

    setTimeout(() => {
      if (won) {
        gameOver = true;
        showMsg(document.getElementById('puzzleMsg'), 'success', 'Brilliant! You got it!');
        setTimeout(() => advancePuzzle(), 900);
      } else if (currentRow >= MAX_TRIES) {
        gameOver = true;
        showMsg(document.getElementById('puzzleMsg'), 'error', `Out of tries! The word was ${answer}.`);
        setTimeout(() => failPuzzle(), 1400);
      } else {
        triesEl.textContent = `Attempt ${currentRow + 1} of ${MAX_TRIES}`;
        cellEls[currentRow].forEach(c => c.classList.add('active-row'));
      }
    }, WORD_LEN * 120 + 200);
  }

  // ── Physical keyboard ────────────────────────────────────────
  let kbListener = e => {
    if (!document.getElementById('step-puzzle').classList.contains('active')) return;
    if (e.ctrlKey || e.metaKey) return;
    const k = e.key.toUpperCase();
    if (k === 'BACKSPACE' || k === 'ENTER' || /^[A-Z]$/.test(k)) {
      e.preventDefault();
      handleKey(k === 'BACKSPACE' ? '⌫' : k);
      // Flash on-screen key
      const btn = keyMap[k === 'BACKSPACE' ? '⌫' : k === 'ENTER' ? 'ENTER' : k];
      if (btn) { btn.style.opacity = '.5'; setTimeout(() => btn.style.opacity = '', 120); }
    }
  };
  document.addEventListener('keydown', kbListener);
  new MutationObserver(() => {
    if (!document.body.contains(grid)) { document.removeEventListener('keydown', kbListener); }
  }).observe(document.getElementById('puzzleWidget'), {childList: true});

  container.appendChild(triesEl);
  container.appendChild(grid);
  container.appendChild(kb);
  }); // end _dec promise
}

//  WIDGET: SNAKE  (WASD / arrow keys + d-pad, fail = go back)
// ════════════════════════════════════════════════════════════════
function buildSnakeWidget(p, container) {
  const COLS = 14, ROWS = 14, CELL = 20;
  const TARGET = p.target;
  let score = 0, running = false, dead = false;
  let dir = {x:1,y:0}, nextDir = {x:1,y:0};
  let snake = [{x:7,y:7},{x:6,y:7},{x:5,y:7}];
  let apple = null;
  let intervalId = null;
  let kbListener = null;

  const wrap = document.createElement('div');
  wrap.className = 'snake-wrap';

  const hud = document.createElement('div');
  hud.className = 'snake-hud';
  hud.innerHTML = `<span id="snakeScore">🍎 <span>0</span> / ${TARGET}</span><span id="snakeStatus">Press Start</span>`;

  const overlay_wrap = document.createElement('div');
  overlay_wrap.className = 'snake-overlay';

  const canvas = document.createElement('canvas');
  canvas.id = 'snakeCanvas';
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  const ctx = canvas.getContext('2d');

  const overlayEl = document.createElement('div');
  overlayEl.className = 'snake-msg';
  overlayEl.id = 'snakeOverlay';

  const startBtn = document.createElement('button');
  startBtn.className = 'snake-start-btn';
  startBtn.textContent = 'Start Game';
  startBtn.addEventListener('click', startGame);

  overlayEl.appendChild(document.createTextNode('Eat ' + TARGET + ' apples to pass!'));
  overlayEl.appendChild(startBtn);
  overlay_wrap.appendChild(canvas);
  overlay_wrap.appendChild(overlayEl);

  // D-pad for touch/mobile
  const dpad = document.createElement('div');
  dpad.className = 'snake-dpad';
  const dpadBtns = [
    {cls:'dpad-btn dpad-up',   icon:'▲', d:{x:0,y:-1}},
    {cls:'dpad-btn dpad-left', icon:'◀', d:{x:-1,y:0}},
    {cls:'dpad-btn dpad-down', icon:'▼', d:{x:0,y:1}},
    {cls:'dpad-btn dpad-right',icon:'▶', d:{x:1,y:0}},
  ];
  dpadBtns.forEach(({cls,icon,d}) => {
    const btn = document.createElement('button');
    btn.className = cls; btn.textContent = icon;
    btn.addEventListener('click', () => { if(running) setDir(d); });
    dpad.appendChild(btn);
  });

  function setDir(d) {
    // Prevent reversing
    if (d.x !== 0 && d.x === -dir.x) return;
    if (d.y !== 0 && d.y === -dir.y) return;
    nextDir = d;
  }

  function placeApple() {
    const empties = [];
    for (let y = 0; y < ROWS; y++)
      for (let x = 0; x < COLS; x++)
        if (!snake.some(s => s.x===x && s.y===y)) empties.push({x,y});
    apple = empties[Math.floor(Math.random()*empties.length)];
  }

  function draw() {
    // Background
    ctx.fillStyle = '#1a1c20';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Grid dots
    ctx.fillStyle = '#2a3040';
    for (let y = 0; y < ROWS; y++)
      for (let x = 0; x < COLS; x++) {
        ctx.beginPath();
        ctx.arc(x*CELL+CELL/2, y*CELL+CELL/2, 1, 0, Math.PI*2);
        ctx.fill();
      }

    // Apple
    if (apple) {
      ctx.font = `${CELL-2}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🍎', apple.x*CELL+CELL/2, apple.y*CELL+CELL/2+1);
    }

    // Snake
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      ctx.fillStyle = isHead ? '#00ffb3' : `hsl(${160 - i*2}, 80%, ${isHead?55:40}%)`;
      const pad = isHead ? 1 : 2;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, isHead?4:3);
      ctx.fill();
    });
  }

  function tick() {
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
    // Self collision
    if (snake.some(s => s.x===head.x && s.y===head.y)) { die(); return; }

    snake.unshift(head);

    if (apple && head.x===apple.x && head.y===apple.y) {
      score++;
      document.querySelector('#snakeScore span').textContent = score;
      if (score >= TARGET) { win(); return; }
      placeApple();
    } else {
      snake.pop();
    }
    draw();
  }

  function startGame() {
    score = 0; dead = false; running = true;
    snake = [{x:7,y:7},{x:6,y:7},{x:5,y:7}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    document.querySelector('#snakeScore span').textContent = '0';
    document.getElementById('snakeStatus').textContent = 'Playing…';
    overlayEl.classList.add('hidden');
    placeApple();
    draw();
    intervalId = setInterval(tick, 140);
  }

  function win() {
    clearInterval(intervalId); running = false;
    draw();
    overlayEl.classList.remove('hidden');
    overlayEl.innerHTML = '<span style="color:var(--success);font-size:1.1rem">You win! 🎉</span>';
    showMsg(document.getElementById('puzzleMsg'), 'success', `Got ${score} apples — unlocking!`);
    setTimeout(() => advancePuzzle(), 1000);
  }

  function die() {
    clearInterval(intervalId); running = false; dead = true;
    // Flash snake red
    ctx.fillStyle = '#ff446680';
    snake.forEach(seg => { ctx.beginPath(); ctx.roundRect(seg.x*CELL+1,seg.y*CELL+1,CELL-2,CELL-2,3); ctx.fill(); });
    setTimeout(() => {
      overlayEl.classList.remove('hidden');
      overlayEl.innerHTML = '<span style="color:var(--error)">Crashed! Sent back…</span>';
      setTimeout(() => failPuzzle(), 900);
    }, 400);
  }

  // Keyboard controls
  kbListener = e => {
    if (!document.getElementById('step-puzzle').classList.contains('active')) return;
    if (!running) return;
    const map = {
      'ARROWUP':{x:0,y:-1},'ARROWDOWN':{x:0,y:1},'ARROWLEFT':{x:-1,y:0},'ARROWRIGHT':{x:1,y:0},
      'W':{x:0,y:-1},'S':{x:0,y:1},'A':{x:-1,y:0},'D':{x:1,y:0}
    };
    const d = map[e.key.toUpperCase()];
    if (d) { e.preventDefault(); setDir(d); }
  };
  document.addEventListener('keydown', kbListener);
  new MutationObserver(() => {
    if (!document.body.contains(canvas)) {
      document.removeEventListener('keydown', kbListener);
      if (intervalId) clearInterval(intervalId);
    }
  }).observe(document.getElementById('puzzleWidget'), {childList: true});

  draw();
  wrap.appendChild(hud);
  wrap.appendChild(overlay_wrap);
  wrap.appendChild(dpad);
  container.appendChild(wrap);
}

document.addEventListener('DOMContentLoaded',()=>{
  renderPasswordDisplay();
  initCrypto(); // encrypt all answers immediately
  // Restore lockout state on page load
  const lockUntil=parseInt(localStorage.getItem('vaultLockUntil')||'0');
  if(Date.now()<lockUntil){
    const input=document.getElementById('passwordInput');
    const msg=document.getElementById('passMsg');
    input.disabled=true;
    startLockCountdown(lockUntil,msg,input);
  }

  const step=document.getElementById('step-puzzle');
  const qi  =document.getElementById('puzzleInput');
  const qq  =document.getElementById('puzzleQuestion');
  [qq,qi].forEach(el=>el.addEventListener('contextmenu',e=>e.preventDefault()));
  step.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&['c','x','v','a'].includes(e.key.toLowerCase()))e.preventDefault();
  });
  qi.addEventListener('paste',e=>e.preventDefault());
});

  const active=document.querySelector('.section.active');
  if(!active)return;
  if(active.id==='step-password')checkPassword();

    const p=puzzleQueue[puzzleIndex];
    if(p&&(p.uiType==='text'||p.uiType==='order'||p.uiType==='slider'))checkPuzzle();
  }
});

//  DOWNLOAD ZIP
//  BACKEND HOOK: For private repos add Authorization header,
//  or generate signed zip from a serverless function instead.
// ════════════════════════════════════════════════════════════════
async function downloadZip(){
  const btn=document.getElementById('dlBtn');
  const msg=document.getElementById('dlMsg');
  btn.disabled=true;btn.textContent='⏳ Building zip…';
  showMsg(msg,'success','Fetching file list from GitHub…');
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    const contentsRes=await fetch('https://api.github.com/repos/pjmills100/files/contents/downloads');
    if(!contentsRes.ok)throw new Error('Could not read folder — is the repo public?');
    const treeRes=await fetch('https://api.github.com/repos/pjmills100/files/git/trees/main?recursive=1');
    if(!treeRes.ok)throw new Error('Could not read repo tree.');
    const files=(await treeRes.json()).tree.filter(i=>i.type==='blob'&&i.path.startsWith('downloads/'));
    if(!files.length)throw new Error('No files found in downloads folder.');
    showMsg(msg,'success',`Found ${files.length} file(s) — building zip…`);
    const zip=new JSZip();
    await Promise.all(files.map(async item=>{
      const r=await fetch(`https://raw.githubusercontent.com/pjmills100/files/main/${item.path}`);
      if(!r.ok)throw new Error('Failed to fetch '+item.path);
      zip.file(item.path.replace(/^downloads\//,''),await r.blob());
    }));
    const url=URL.createObjectURL(await zip.generateAsync({type:'blob'}));
    Object.assign(document.createElement('a'),{href:url,download:'downloads.zip'}).click();
    URL.revokeObjectURL(url);
    showMsg(msg,'success','downloads.zip downloaded!');
    btn.textContent='✅ Downloaded!';
  }catch(err){
    showMsg(msg,'error','Error: '+err.message);
    btn.disabled=false;btn.textContent='⬇ Download Files';
  }
}
function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){resolve();return}
    const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}
