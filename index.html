<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure File Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0a0a0f;
      --surface:     #111118;
      --border:      #2a2a3a;
      --accent:      #00ffb3;
      --accent-dim:  #00ffb322;
      --text:        #e8e8f0;
      --muted:       #6b6b80;
      --success:     #00ffb3;
      --error:       #ff4466;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --radius:       12px;
      --ease:         cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      z-index: 0;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, #00ffb315 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: blobPulse 6s ease-in-out infinite;
    }

    @keyframes blobPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      padding: 40px 36px;
      box-shadow: 0 0 60px #00ffb30a, 0 24px 80px #00000080;
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 0 0 2px 2px;
    }

    .vault-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--accent-dim);
      margin-bottom: 20px;
      font-size: 24px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .step-dot {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s var(--ease);
    }

    .step-dot.active { background: var(--accent); }
    .step-dot.done   { background: var(--accent); opacity: 0.4; }

    .field-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .input.error { border-color: var(--error);   box-shadow: 0 0 0 3px #ff446620; }
    .input.ok    { border-color: var(--success);  box-shadow: 0 0 0 3px var(--accent-dim); }

    .msg {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
      line-height: 1.4;
    }

    .msg.error   { display: block; color: var(--error);   background: #ff446618; border: 1px solid #ff446630; }
    .msg.success { display: block; color: var(--success); background: #00ffb318; border: 1px solid #00ffb330; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 13px 24px;
      border-radius: 8px;
      border: none;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0 4px 24px #00ffb330;
    }

    .btn-primary:hover { box-shadow: 0 4px 32px #00ffb360; transform: translateY(-1px); }

    .btn-download {
      background: linear-gradient(135deg, var(--accent), #00d4ff);
      color: #000;
      font-size: 1rem;
      padding: 16px 24px;
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 4px 32px #00ffb340; }
      50%       { box-shadow: 0 4px 48px #00ffb370; }
    }

    .btn-download:hover { transform: translateY(-2px); }

    .puzzle-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .puzzle-type {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .puzzle-question {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
    }

    .section { display: none; }
    .section.active { display: block; animation: fadeUp 0.4s var(--ease) both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
      animation: bounceIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes bounceIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .success-sub {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .security-note {
      margin-top: 24px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px dashed var(--border);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .security-note strong { color: #ff3cac; }

    @media (max-width: 520px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="vault-icon">🔒</div>
  <h1>Secure Vault</h1>
  <p class="subtitle">Protected File Access System</p>

  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot"        id="dot2"></div>
    <div class="step-dot"        id="dot3"></div>
  </div>

  <!-- STEP 1 — PASSWORD -->
  <div class="section active" id="step-password">
    <label class="field-label" for="passwordInput">Enter Access Password</label>
    <input
      class="input"
      id="passwordInput"
      type="password"
      placeholder="••••••••••"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="msg" id="passMsg"></div>
    <!--
      BACKEND HOOK: Replace checkPassword() with a fetch() POST to your
      serverless function. Read the password from an env variable server-side.
      Never put the real password in client JS for production.
    -->
    <button class="btn btn-primary" onclick="checkPassword()">
      Verify Password →
    </button>
  </div>

  <!-- STEP 2 — PUZZLE -->
  <div class="section" id="step-puzzle">
    <div class="puzzle-box">
      <div class="puzzle-type" id="puzzleType"></div>
      <div class="puzzle-question" id="puzzleQuestion"></div>
    </div>
    <label class="field-label" for="puzzleInput">Your Answer</label>
    <input
      class="input"
      id="puzzleInput"
      type="text"
      placeholder="Type your answer…"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="msg" id="puzzleMsg"></div>
    <!--
      BACKEND HOOK: Replace checkPuzzle() with a POST to your serverless
      function. Store puzzle answers in a server session or signed JWT.
    -->
    <button class="btn btn-primary" onclick="checkPuzzle()">
      Check Answer →
    </button>
  </div>

  <!-- STEP 3 — DOWNLOAD -->
  <div class="section" id="step-download">
    <span class="success-icon">✅</span>
    <div class="success-title">Access Granted</div>
    <p class="success-sub">
      Both checks passed. Your secure file is ready.<br />
      Click below to download.
    </p>
    <!--
      BACKEND HOOK: Replace this static href with a call to a serverless
      function returning a time-limited signed URL (e.g. S3 presigned URL).
    -->
    <a href="files/secret.txt" download="secret.txt" style="text-decoration:none;">
      <button class="btn btn-download">⬇ Download Secret File</button>
    </a>
  </div>

  <div class="security-note">
    <strong>⚠ Dev mode:</strong> password &amp; puzzle answers checked client-side.
    Search <strong>BACKEND HOOK</strong> comments to add server-side verification.
  </div>
</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────
  // BACKEND HOOK: Move this to an environment variable / server-side check.
  const CORRECT_PASSWORD = 'ilikecatsbutdogsarebetterwhydidihavetotypeallthisnonsense';

  // ── PUZZLE BANK (Color Code removed) ───────────────────────────
  const PUZZLE_BANK = [
    // Math
    { type: 'Math Problem',    question: 'What is 15 × 3?',                           answer: '45'       },
    { type: 'Math Problem',    question: 'What is 256 ÷ 16?',                         answer: '16'       },
    { type: 'Math Problem',    question: 'What is 7² + 1?',                           answer: '50'       },
    { type: 'Math Problem',    question: 'What is 8 × 8 − 4?',                        answer: '60'       },
    // Word Scramble
    { type: 'Word Scramble',   question: 'Unscramble: "act" (3-letter animal)',       answer: 'cat'      },
    { type: 'Word Scramble',   question: 'Unscramble: "elapp"',                       answer: 'apple'    },
    { type: 'Word Scramble',   question: 'Unscramble: "rcilce"',                      answer: 'circle'   },
    { type: 'Word Scramble',   question: 'Unscramble: "tgnhi"',                       answer: 'night'    },
    // Number Sequence
    { type: 'Number Sequence', question: 'What comes next? 1, 3, 5, 7, ?',           answer: '9'        },
    { type: 'Number Sequence', question: 'What comes next? 2, 4, 8, 16, ?',          answer: '32'       },
    { type: 'Number Sequence', question: 'What comes next? 0, 1, 1, 2, 3, 5, ?',     answer: '8'        },
    { type: 'Number Sequence', question: 'What comes next? 3, 6, 9, 12, ?',          answer: '15'       },
    // Riddle
    { type: 'Riddle',          question: 'What has keys but no locks?',               answer: 'piano'    },
    { type: 'Riddle',          question: 'I have hands but cannot clap. What am I?',  answer: 'clock'    },
    { type: 'Riddle',          question: 'What gets wetter the more it dries?',       answer: 'towel'    },
    { type: 'Riddle',          question: 'I speak without a mouth. What am I?',       answer: 'echo'     },
    // Reverse Word
    { type: 'Reverse Word',    question: 'Spell "pots" backwards.',                   answer: 'stop'     },
    { type: 'Reverse Word',    question: 'Spell "evil" backwards.',                   answer: 'live'     },
    { type: 'Reverse Word',    question: 'Spell "desserts" backwards.',               answer: 'stressed' },
    { type: 'Reverse Word',    question: 'Spell "noon" backwards.',                   answer: 'noon'     },
    // Missing Letter
    { type: 'Missing Letter',  question: 'W _ T E R  (fill the blank)',               answer: 'a'        },
    { type: 'Missing Letter',  question: 'P _ Z Z L E  (fill the blank)',             answer: 'u'        },
    { type: 'Missing Letter',  question: 'S _ C R E T  (fill the blank)',             answer: 'e'        },
    { type: 'Missing Letter',  question: 'B _ T T L E  (fill the blank)',             answer: 'a'        },
    // Roman Numerals
    { type: 'Roman Numerals',  question: 'What number is X?',                         answer: '10'       },
    { type: 'Roman Numerals',  question: 'What number is XIV?',                       answer: '14'       },
    { type: 'Roman Numerals',  question: 'What number is XL?',                        answer: '40'       },
    { type: 'Roman Numerals',  question: 'What number is LXIX?',                      answer: '69'       },
  ];

  // ── STATE ───────────────────────────────────────────────────────
  let currentPuzzle = null;

  // ── STEP NAVIGATION ─────────────────────────────────────────────
  function showStep(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const num = { 'step-password': 1, 'step-puzzle': 2, 'step-download': 3 }[id];
    ['dot1','dot2','dot3'].forEach((d, i) => {
      const el = document.getElementById(d);
      el.className = 'step-dot';
      if (i + 1 === num) el.classList.add('active');
      if (i + 1 <  num)  el.classList.add('done');
    });
  }

  // ── PASSWORD ─────────────────────────────────────────────────────
  // BACKEND HOOK: swap body with fetch('/api/verify-password', { method:'POST', body: JSON.stringify({password:val}) })
  function checkPassword() {
    const val   = document.getElementById('passwordInput').value;
    const input = document.getElementById('passwordInput');
    const msg   = document.getElementById('passMsg');
    if (!val.trim()) { showMsg(msg, 'error', 'Please enter the access password.'); return; }

    if (val === CORRECT_PASSWORD) {
      setInput(input, 'ok');
      showMsg(msg, 'success', 'Password accepted — loading your challenge…');
      setTimeout(() => { loadPuzzle(); showStep('step-puzzle'); }, 650);
    } else {
      setInput(input, 'error');
      showMsg(msg, 'error', 'Incorrect password. Try again.');
      shake(input);
    }
  }

  // ── PUZZLE ───────────────────────────────────────────────────────
  // BACKEND HOOK: swap checkPuzzle body with fetch('/api/verify-puzzle', ...)
  function loadPuzzle() {
    currentPuzzle = PUZZLE_BANK[Math.floor(Math.random() * PUZZLE_BANK.length)];
    document.getElementById('puzzleType').textContent     = '// ' + currentPuzzle.type;
    document.getElementById('puzzleQuestion').textContent = currentPuzzle.question;
    const input = document.getElementById('puzzleInput');
    input.value = '';
    setInput(input, '');
    clearMsg(document.getElementById('puzzleMsg'));
  }

  function checkPuzzle() {
    const val   = document.getElementById('puzzleInput').value.trim().toLowerCase();
    const input = document.getElementById('puzzleInput');
    const msg   = document.getElementById('puzzleMsg');
    if (!val) { showMsg(msg, 'error', 'Please enter an answer.'); return; }

    if (val === currentPuzzle.answer.toLowerCase()) {
      setInput(input, 'ok');
      showMsg(msg, 'success', 'Correct! Unlocking your file…');
      setTimeout(() => showStep('step-download'), 700);
    } else {
      setInput(input, 'error');
      showMsg(msg, 'error', 'Not quite — try again!');
      shake(input);
    }
  }

  // ── HELPERS ──────────────────────────────────────────────────────
  function showMsg(el, type, text) { el.className = 'msg ' + type; el.textContent = text; }
  function clearMsg(el)            { el.className = 'msg'; el.textContent = ''; }
  function setInput(el, state)     { el.classList.remove('ok','error'); if (state) el.classList.add(state); }
  function shake(el) {
    el.animate([
      {transform:'translateX(0)'},{transform:'translateX(-8px)'},
      {transform:'translateX(8px)'},{transform:'translateX(-5px)'},
      {transform:'translateX(5px)'},{transform:'translateX(0)'},
    ], {duration:380, easing:'ease-out'});
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.section.active');
    if (!active) return;
    if (active.id === 'step-password') checkPassword();
    if (active.id === 'step-puzzle')   checkPuzzle();
  });
</script>
</body>
</html>
