<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure File Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0a0a0f;
      --surface:     #111118;
      --border:      #2a2a3a;
      --accent:      #00ffb3;
      --accent-dim:  #00ffb322;
      --text:        #e8e8f0;
      --muted:       #6b6b80;
      --success:     #00ffb3;
      --error:       #ff4466;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --radius:       12px;
      --ease:         cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      z-index: 0;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, #00ffb315 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: blobPulse 6s ease-in-out infinite;
    }

    @keyframes blobPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      padding: 40px 36px;
      box-shadow: 0 0 60px #00ffb30a, 0 24px 80px #00000080;
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 0 0 2px 2px;
    }

    .vault-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--accent-dim);
      margin-bottom: 20px;
      font-size: 24px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .step-dot {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s var(--ease);
    }

    .step-dot.active { background: var(--accent); }
    .step-dot.done   { background: var(--accent); opacity: 0.4; }

    .field-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .input.error { border-color: var(--error);   box-shadow: 0 0 0 3px #ff446620; }
    .input.ok    { border-color: var(--success);  box-shadow: 0 0 0 3px var(--accent-dim); }

    .msg {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
      line-height: 1.4;
    }

    .msg.error   { display: block; color: var(--error);   background: #ff446618; border: 1px solid #ff446630; }
    .msg.success { display: block; color: var(--success); background: #00ffb318; border: 1px solid #00ffb330; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 13px 24px;
      border-radius: 8px;
      border: none;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0 4px 24px #00ffb330;
    }

    .btn-primary:hover { box-shadow: 0 4px 32px #00ffb360; transform: translateY(-1px); }

    .btn-download {
      background: linear-gradient(135deg, var(--accent), #00d4ff);
      color: #000;
      font-size: 1rem;
      padding: 16px 24px;
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 4px 32px #00ffb340; }
      50%       { box-shadow: 0 4px 48px #00ffb370; }
    }

    .btn-download:hover { transform: translateY(-2px); }

    .puzzle-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .puzzle-counter {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .puzzle-pips {
      display: flex;
      gap: 6px;
    }

    .pip {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s var(--ease), transform 0.3s var(--ease);
    }

    .pip.active { background: var(--accent); transform: scale(1.2); }
    .pip.done   { background: var(--accent); opacity: 0.4; transform: scale(1); }

    .puzzle-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .puzzle-type {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .puzzle-question {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    .section { display: none; }
    .section.active { display: block; animation: fadeUp 0.4s var(--ease) both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
      animation: bounceIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes bounceIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .success-sub {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .security-note {
      margin-top: 24px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px dashed var(--border);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .security-note strong { color: #ff3cac; }

    @media (max-width: 520px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="vault-icon">🔒</div>
  <h1>Secure Vault</h1>
  <p class="subtitle">Protected File Access System</p>

  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot"        id="dot2"></div>
    <div class="step-dot"        id="dot3"></div>
    <div class="step-dot"        id="dot4"></div>
    <div class="step-dot"        id="dot5"></div>
  </div>

  <!-- STEP 1 — PASSWORD -->
  <div class="section active" id="step-password">
    <label class="field-label" for="passwordInput">Enter Access Password</label>
    <input
      class="input"
      id="passwordInput"
      type="password"
      placeholder="••••••••••"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="msg" id="passMsg"></div>
    <!--
      BACKEND HOOK: Replace checkPassword() with a fetch() POST to your
      serverless function. Read the password from an env variable server-side.
      Never put the real password in client JS for production.
    -->
    <button class="btn btn-primary" onclick="checkPassword()">
      Verify Password →
    </button>
  </div>

  <!-- STEP 2 — PUZZLE -->
  <div class="section" id="step-puzzle">
    <div class="puzzle-progress">
      <span class="puzzle-counter" id="puzzleCounter">Challenge 1 of 3</span>
      <div class="puzzle-pips">
        <div class="pip active" id="pip1"></div>
        <div class="pip"        id="pip2"></div>
        <div class="pip"        id="pip3"></div>
      </div>
    </div>
    <div class="puzzle-box">
      <div class="puzzle-type" id="puzzleType"></div>
      <div class="puzzle-question" id="puzzleQuestion"></div>
    </div>
    <label class="field-label" for="puzzleInput">Your Answer</label>
    <input
      class="input"
      id="puzzleInput"
      type="text"
      placeholder="Type your answer…"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="msg" id="puzzleMsg"></div>
    <button class="btn btn-primary" onclick="checkPuzzle()">
      Check Answer →
    </button>
  </div>

  <!-- STEP 3 — DOWNLOAD -->
  <div class="section" id="step-download">
    <span class="success-icon">✅</span>
    <div class="success-title">Access Granted</div>
    <p class="success-sub">
      Both checks passed. Your secure file is ready.<br />
      Click below to download.
    </p>
    <!--
      BACKEND HOOK: Replace this static href with a call to a serverless
      function returning a time-limited signed URL (e.g. S3 presigned URL).
    -->
    <button class="btn btn-download" id="dlBtn" onclick="downloadZip()">⬇ Download Files</button>
    <div class="msg" id="dlMsg"></div>
  </div>

  <div class="security-note">
    <strong>⚠ Dev mode:</strong> password &amp; puzzle answers checked client-side.
    Search <strong>BACKEND HOOK</strong> comments to add server-side verification.
  </div>
</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────
  // BACKEND HOOK: Move this to an environment variable / server-side check.
  const CORRECT_PASSWORD = 'FXWc8bG0&xmsNm(n=cAG1F#%&=r$WVP9*CS2%zB^r?E(#XD^yFR&9';

  // ── PUZZLE BANK — 60 hard puzzles across 8 types ───────────────
  const PUZZLE_BANK = [
    // Hard Math
    { type: 'Math Problem',    question: 'What is 17 × 13?',                                    answer: '221'         },
    { type: 'Math Problem',    question: 'What is √(144) + 5²?',                                answer: '37'          },
    { type: 'Math Problem',    question: 'What is 2⁸?',                                         answer: '256'         },
    { type: 'Math Problem',    question: 'What is 1000 ÷ 8?',                                   answer: '125'         },
    { type: 'Math Problem',    question: 'What is 99 × 99?',                                    answer: '9801'        },
    { type: 'Math Problem',    question: 'What is 3³ + 4³?',                                    answer: '91'          },
    { type: 'Math Problem',    question: 'What is 15% of 240?',                                 answer: '36'          },
    { type: 'Math Problem',    question: 'If x² = 169, what is x? (positive)',                  answer: '13'          },

    // Hard Word Scramble (longer words)
    { type: 'Word Scramble',   question: 'Unscramble: "nrcsaale"',                              answer: 'lancers'     },
    { type: 'Word Scramble',   question: 'Unscramble: "ptiahol"',                               answer: 'hospital'    },
    { type: 'Word Scramble',   question: 'Unscramble: "tlbfuieua"',                             answer: 'beautiful'   },
    { type: 'Word Scramble',   question: 'Unscramble: "tcarntoc"',                              answer: 'contract'    },
    { type: 'Word Scramble',   question: 'Unscramble: "iemntuo"',                               answer: 'mountain'    },
    { type: 'Word Scramble',   question: 'Unscramble: "aaebclns"',                              answer: 'balances'    },
    { type: 'Word Scramble',   question: 'Unscramble: "rcahtecir"',                             answer: 'architect'   },
    { type: 'Word Scramble',   question: 'Unscramble: "lphieodp"',                              answer: 'dolphins'    },

    // Hard Number Sequences
    { type: 'Number Sequence', question: 'What comes next? 1, 4, 9, 16, 25, ?',                answer: '36'          },
    { type: 'Number Sequence', question: 'What comes next? 3, 7, 13, 21, 31, ?',               answer: '43'          },
    { type: 'Number Sequence', question: 'What comes next? 2, 3, 5, 7, 11, 13, ?',             answer: '17'          },
    { type: 'Number Sequence', question: 'What comes next? 1, 8, 27, 64, ?',                   answer: '125'         },
    { type: 'Number Sequence', question: 'What comes next? 192, 96, 48, 24, ?',                answer: '12'          },
    { type: 'Number Sequence', question: 'What comes next? 0, 1, 3, 6, 10, 15, ?',             answer: '21'          },
    { type: 'Number Sequence', question: 'What comes next? 2, 6, 12, 20, 30, ?',               answer: '42'          },
    { type: 'Number Sequence', question: 'What comes next? 1, 2, 6, 24, 120, ?',               answer: '720'         },

    // Hard Riddles
    { type: 'Riddle',          question: 'I have cities but no houses, forests but no trees, and water but no fish. What am I?', answer: 'map' },
    { type: 'Riddle',          question: 'The more you take, the more you leave behind. What am I?',  answer: 'footsteps'   },
    { type: 'Riddle',          question: 'I am not alive, but I can grow. I have no lungs, but I need air. What am I?', answer: 'fire' },
    { type: 'Riddle',          question: 'I can travel around the world without moving. What am I?',  answer: 'stamp'       },
    { type: 'Riddle',          question: 'I have a head and a tail but no body. What am I?',          answer: 'coin'        },
    { type: 'Riddle',          question: 'What can run but never walks, has a mouth but never talks?', answer: 'river'      },
    { type: 'Riddle',          question: 'I am always hungry and must always be fed. What am I?',     answer: 'fire'        },
    { type: 'Riddle',          question: 'What has an eye but cannot see?',                           answer: 'needle'      },

    // Reverse Word (harder)
    { type: 'Reverse Word',    question: 'Spell "stressed" backwards.',                         answer: 'desserts'    },
    { type: 'Reverse Word',    question: 'Spell "repaid" backwards.',                           answer: 'diaper'      },
    { type: 'Reverse Word',    question: 'Spell "deliver" backwards.',                          answer: 'reviled'     },
    { type: 'Reverse Word',    question: 'Spell "gateman" backwards.',                          answer: 'nametag'     },
    { type: 'Reverse Word',    question: 'Spell "drawer" backwards.',                           answer: 'reward'      },
    { type: 'Reverse Word',    question: 'Spell "diaper" backwards.',                           answer: 'repaid'      },
    { type: 'Reverse Word',    question: 'Spell "live" backwards.',                             answer: 'evil'        },
    { type: 'Reverse Word',    question: 'Spell "wolf" backwards.',                             answer: 'flow'        },

    // Missing Letter (harder, multi-blank)
    { type: 'Missing Letter',  question: 'EL _ PH _ NT  (two blanks — just type both letters in order)', answer: 'ea' },
    { type: 'Missing Letter',  question: 'SCH _ _ ULE  (two blanks)',                           answer: 'ed'          },
    { type: 'Missing Letter',  question: 'KN _ _ LEDGE  (two blanks)',                          answer: 'ow'          },
    { type: 'Missing Letter',  question: 'FR _ _ UENCY  (two blanks)',                          answer: 'eq'          },
    { type: 'Missing Letter',  question: 'B _ _ UTIFUL  (two blanks)',                          answer: 'ea'          },
    { type: 'Missing Letter',  question: 'EM _ _ RASS  (two blanks)',                           answer: 'ba'          },
    { type: 'Missing Letter',  question: 'N _ CESSARY  (one blank)',                            answer: 'e'           },
    { type: 'Missing Letter',  question: 'S _ PARATE  (one blank)',                             answer: 'e'           },

    // Roman Numerals (harder)
    { type: 'Roman Numerals',  question: 'What number is XCIX?',                                answer: '99'          },
    { type: 'Roman Numerals',  question: 'What number is CDXLIV?',                             answer: '444'         },
    { type: 'Roman Numerals',  question: 'What number is MCMXCIX?',                            answer: '1999'        },
    { type: 'Roman Numerals',  question: 'What number is DCCCXL?',                             answer: '840'         },
    { type: 'Roman Numerals',  question: 'Convert 2024 to Roman numerals.',                    answer: 'mmxxiv'      },
    { type: 'Roman Numerals',  question: 'What number is MMCDXXI?',                            answer: '2421'        },
    { type: 'Roman Numerals',  question: 'What number is DLXXVII?',                            answer: '577'         },
    { type: 'Roman Numerals',  question: 'Convert 1776 to Roman numerals.',                    answer: 'mdcclxxvi'   },

    // Logic / Pattern
    { type: 'Logic',           question: 'A rooster lays an egg on a roof. Which way does it roll?',  answer: 'roosters don\'t lay eggs' },
    { type: 'Logic',           question: 'How many months have 28 days?',                       answer: '12'          },
    { type: 'Logic',           question: 'If you have 3 apples and take away 2, how many do YOU have?', answer: '2'   },
    { type: 'Logic',           question: 'A plane crashes on the border of US and Canada. Where do they bury survivors?', answer: 'you don\'t bury survivors' },
    { type: 'Logic',           question: 'What word is spelled incorrectly in every dictionary?', answer: 'incorrectly' },
    { type: 'Logic',           question: 'I have 6 eggs. I broke 2, cooked 2, and ate 2. How many do I have left?', answer: '4' },
    { type: 'Logic',           question: 'What occurs once in a minute, twice in a moment, never in a thousand years?', answer: 'm' },
    { type: 'Logic',           question: 'Before Mt. Everest was discovered, what was the tallest mountain?', answer: 'everest' },
  ];

  // ── STATE ───────────────────────────────────────────────────────
  let puzzleQueue    = [];   // 3 randomly selected puzzles
  let puzzleIndex    = 0;    // which puzzle we're on (0-2)

  // Pick 3 unique puzzles from the bank, ensuring all different types
  function pickPuzzles() {
    const shuffled = [...PUZZLE_BANK].sort(() => Math.random() - 0.5);
    // Try to get 3 different types
    const chosen = [];
    const usedTypes = new Set();
    for (const p of shuffled) {
      if (!usedTypes.has(p.type)) { chosen.push(p); usedTypes.add(p.type); }
      if (chosen.length === 3) break;
    }
    // Fallback if not enough types
    while (chosen.length < 3) chosen.push(shuffled[chosen.length]);
    return chosen;
  }

  // ── STEP NAVIGATION ─────────────────────────────────────────────
  // Dots: 1=password, 2=puzzle1, 3=puzzle2, 4=puzzle3, 5=download
  function updateDots(activeDot) {
    for (let i = 1; i <= 5; i++) {
      const el = document.getElementById('dot' + i);
      el.className = 'step-dot';
      if (i === activeDot) el.classList.add('active');
      if (i < activeDot)   el.classList.add('done');
    }
  }

  function showStep(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'step-password') updateDots(1);
    if (id === 'step-puzzle')   updateDots(2 + puzzleIndex);
    if (id === 'step-download') updateDots(5);
  }

  // ── PASSWORD ─────────────────────────────────────────────────────
  // BACKEND HOOK: swap body with fetch('/api/verify-password', { method:'POST', body: JSON.stringify({password:val}) })
  function checkPassword() {
    const val   = document.getElementById('passwordInput').value;
    const input = document.getElementById('passwordInput');
    const msg   = document.getElementById('passMsg');
    if (!val.trim()) { showMsg(msg, 'error', 'Please enter the access password.'); return; }

    if (val === CORRECT_PASSWORD) {
      setInput(input, 'ok');
      showMsg(msg, 'success', 'Password accepted — loading your challenges…');
      setTimeout(() => {
        puzzleQueue = pickPuzzles();
        puzzleIndex = 0;
        loadPuzzle();
        showStep('step-puzzle');
      }, 650);
    } else {
      setInput(input, 'error');
      showMsg(msg, 'error', 'Incorrect password. Try again.');
      shake(input);
    }
  }

  // ── PUZZLE ───────────────────────────────────────────────────────
  // BACKEND HOOK: swap checkPuzzle body with fetch('/api/verify-puzzle', ...)
  function loadPuzzle() {
    const p = puzzleQueue[puzzleIndex];
    document.getElementById('puzzleCounter').textContent = `Challenge ${puzzleIndex + 1} of 3`;
    document.getElementById('puzzleType').textContent    = '// ' + p.type;
    document.getElementById('puzzleQuestion').textContent = p.question;

    // Update pips
    for (let i = 1; i <= 3; i++) {
      const pip = document.getElementById('pip' + i);
      pip.className = 'pip';
      if (i === puzzleIndex + 1) pip.classList.add('active');
      if (i < puzzleIndex + 1)   pip.classList.add('done');
    }

    const input = document.getElementById('puzzleInput');
    input.value = '';
    setInput(input, '');
    clearMsg(document.getElementById('puzzleMsg'));
    input.focus();
  }

  function checkPuzzle() {
    const raw   = document.getElementById('puzzleInput').value.trim();
    const val   = raw.toLowerCase();
    const input = document.getElementById('puzzleInput');
    const msg   = document.getElementById('puzzleMsg');
    if (!raw) { showMsg(msg, 'error', 'Please enter an answer.'); return; }

    const expected = puzzleQueue[puzzleIndex].answer.toLowerCase();
    if (val === expected) {
      setInput(input, 'ok');
      puzzleIndex++;
      if (puzzleIndex < 3) {
        showMsg(msg, 'success', `Correct! ${3 - puzzleIndex} challenge${3 - puzzleIndex > 1 ? 's' : ''} remaining…`);
        setTimeout(() => {
          showStep('step-puzzle');
          loadPuzzle();
        }, 800);
      } else {
        showMsg(msg, 'success', 'All 3 challenges solved! Unlocking your file…');
        setTimeout(() => showStep('step-download'), 800);
      }
    } else {
      setInput(input, 'error');
      showMsg(msg, 'error', 'Not quite — try again!');
      shake(input);
    }
  }

  // ── HELPERS ──────────────────────────────────────────────────────
  function showMsg(el, type, text) { el.className = 'msg ' + type; el.textContent = text; }
  function clearMsg(el)            { el.className = 'msg'; el.textContent = ''; }
  function setInput(el, state)     { el.classList.remove('ok','error'); if (state) el.classList.add(state); }
  function shake(el) {
    el.animate([
      {transform:'translateX(0)'},{transform:'translateX(-8px)'},
      {transform:'translateX(8px)'},{transform:'translateX(-5px)'},
      {transform:'translateX(5px)'},{transform:'translateX(0)'},
    ], {duration:380, easing:'ease-out'});
  }

  // ── DOWNLOAD ZIP ─────────────────────────────────────────────────
  // Uses the GitHub Git Trees API (recursive=1) to get every file inside
  // downloads/ in one request, then fetches each file by its raw URL and
  // bundles them all into a zip — preserving any subfolder structure.
  // BACKEND HOOK: For private repos, add an Authorization header with a
  // personal access token, or generate the zip server-side instead.

  async function downloadZip() {
    const btn = document.getElementById('dlBtn');
    const msg = document.getElementById('dlMsg');
    btn.disabled = true;
    btn.textContent = '⏳ Building zip…';
    showMsg(msg, 'success', 'Fetching file list from GitHub…');

    try {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');

      // Step 1: get the SHA of the downloads folder via contents API
      const contentsRes = await fetch('https://api.github.com/repos/pjmills100/files/contents/downloads');
      if (!contentsRes.ok) throw new Error('Could not read folder — is the repo public?');

      // Step 2: use the recursive Git Trees API to get every file at any depth
      const treeRes = await fetch('https://api.github.com/repos/pjmills100/files/git/trees/main?recursive=1');
      if (!treeRes.ok) throw new Error('Could not read repo tree.');
      const treeData = await treeRes.json();

      // Filter to only files (blobs) that are inside the downloads/ folder
      const filesToDownload = treeData.tree.filter(
        item => item.type === 'blob' && item.path.startsWith('downloads/')
      );

      if (filesToDownload.length === 0) throw new Error('No files found in downloads folder.');

      showMsg(msg, 'success', `Found ${filesToDownload.length} file(s) — building zip…`);

      const zip = new JSZip();

      // Step 3: fetch each file by raw URL and add it to the zip,
      // keeping the path relative to downloads/ (strips the "downloads/" prefix)
      await Promise.all(filesToDownload.map(async item => {
        const rawUrl = `https://raw.githubusercontent.com/pjmills100/files/main/${item.path}`;
        const r = await fetch(rawUrl);
        if (!r.ok) throw new Error('Failed to fetch ' + item.path);
        const blob = await r.blob();
        // Path inside zip: strip leading "downloads/" so zip root = downloads folder contents
        const zipPath = item.path.replace(/^downloads\//, '');
        zip.file(zipPath, blob);
      }));

      // Step 4: generate blob and trigger browser download
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = 'downloads.zip';
      a.click();
      URL.revokeObjectURL(url);

      showMsg(msg, 'success', 'downloads.zip downloaded successfully!');
      btn.textContent = '✅ Downloaded!';
    } catch (err) {
      showMsg(msg, 'error', 'Error: ' + err.message);
      btn.disabled    = false;
      btn.textContent = '⬇ Download Files';
    }
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.section.active');
    if (!active) return;
    if (active.id === 'step-password') checkPassword();
    if (active.id === 'step-puzzle')   checkPuzzle();
  });

  // ── BLOCK COPY / PASTE ON PUZZLE ────────────────────────────────
  // Prevent copying the question text or pasting answers into the input
  const puzzleQuestion = document.getElementById('puzzleQuestion');
  const puzzleInput    = document.getElementById('puzzleInput');

  // Block right-click context menu on the question and input
  [puzzleQuestion, puzzleInput].forEach(el => {
    el.addEventListener('contextmenu', e => e.preventDefault());
  });

  // Block keyboard copy/cut/paste shortcuts on the puzzle section
  document.getElementById('step-puzzle').addEventListener('keydown', e => {
    const blocked = ['c', 'x', 'v', 'a'];
    if ((e.ctrlKey || e.metaKey) && blocked.includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });

  // Block paste event directly on the input (covers mobile & browser paste buttons)
  puzzleInput.addEventListener('paste', e => e.preventDefault());

  // Block text selection on the question box via CSS (applied dynamically)
  puzzleQuestion.style.userSelect        = 'none';
  puzzleQuestion.style.webkitUserSelect  = 'none';
  puzzleQuestion.style.msUserSelect      = 'none';
</script>
</body>
