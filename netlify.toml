# Netlify deployment configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."   # serve files from repo root

# Prevent search engines from indexing the secret file.
# NOTE: This does NOT prevent direct URL access. For real protection,
# move the file to a private store and serve it via a signed URL from
# a Netlify Function (see BACKEND HOOK comments in index.html).
[[headers]]
  for = "/files/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Serve index.html for any unmatched route (SPA fallback)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
